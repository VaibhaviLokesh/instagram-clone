name: instagram_clone
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Local image storage
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # State management
  provider: ^6.1.2

  # UI utilities
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  uuid: ^4.5.1

  # Video
  video_player: ^2.9.2
  chewie: ^1.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true